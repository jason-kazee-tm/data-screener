version: '3.8'\n\nservices:\n  # PostgreSQL Database\n  postgres:\n    image: postgres:15-alpine\n    container_name: data-screener-postgres\n    environment:\n      POSTGRES_USER: data_screener\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screener_password}\n      POSTGRES_DB: data_screener\n      POSTGRES_INITDB_ARGS: "--encoding=UTF8"\n    ports:\n      - "5432:5432"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql\n    networks:\n      - data-screener-network\n    healthcheck:\n      test: ["CMD-SHELL", "pg_isready -U data_screener"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  # Flask Backend API\n  backend:\n    build:\n      context: .\n      dockerfile: Dockerfile.backend\n    container_name: data-screener-backend\n    environment:\n      FLASK_ENV: production\n      DATABASE_URL: postgresql://data_screener:${POSTGRES_PASSWORD:-screener_password}@postgres:5432/data_screener\n      API_HOST: 0.0.0.0\n      API_PORT: 5000\n      FRONTEND_URL: http://localhost:3000\n    ports:\n      - "5000:5000"\n    depends_on:\n      postgres:\n        condition: service_healthy\n    volumes:\n      - ./app:/app/app\n      - ./uploads:/app/uploads\n    networks:\n      - data-screener-network\n    healthcheck:\n      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 10s\n\n  # React Frontend\n  frontend:\n    build:\n      context: .\n      dockerfile: Dockerfile.frontend\n    container_name: data-screener-frontend\n    environment:\n      REACT_APP_API_URL: http://localhost:5000/api\n    ports:\n      - "3000:3000"\n    depends_on:\n      - backend\n    networks:\n      - data-screener-network\n    healthcheck:\n      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 10s\n\n  # Nginx Reverse Proxy (Optional - for production)\n  nginx:\n    image: nginx:alpine\n    container_name: data-screener-nginx\n    ports:\n      - "80:80"\n      - "443:443"\n    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro\n      - ./nginx/ssl:/etc/nginx/ssl:ro\n    depends_on:\n      - backend\n      - frontend\n    networks:\n      - data-screener-network\n    profiles:\n      - production\n\nvolumes:\n  postgres_data:\n    driver: local\n\networks:\n  data-screener-network:\n    driver: bridge\n